name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  unit-tests:
    name: Unit tests (debug)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run unit tests
      run: cargo test --verbose --lib --bins -- --test-threads=1

  validation-tests:
    name: Validation tests (release)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build (release)
      run: cargo build --release --verbose
    - name: Run all tests (release, sequential)
      run: cargo test --release --verbose -- --test-threads=1

  all-features-test:
    name: All features test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Test with all features
      run: cargo test --all-features --verbose -- --test-threads=1

  no-std-check:
    name: no_std compatibility
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check no_std with core features
      run: cargo check --no-default-features --features core
    - name: Check no_std with individual features
      run: |
        cargo check --no-default-features --features matplotlib
        cargo check --no-default-features --features crameri
        cargo check --no-default-features --features cet
        cargo check --no-default-features --features cmocean
        cargo check --no-default-features --features moreland
        cargo check --no-default-features --features cmasher
        cargo check --no-default-features --features colorbrewer
        cargo check --no-default-features --features cartocolors
        cargo check --no-default-features --features ncar
        cargo check --no-default-features --features d3
        cargo check --no-default-features --features all
