name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  unit-tests:
    name: Unit tests (debug)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run unit tests
      run: cargo test --verbose --lib --bins -- --test-threads=1

  validation-tests:
    name: Validation tests (release)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build (release)
      run: cargo build --release --verbose
    - name: Run all tests (release, sequential)
      run: cargo test --release --verbose -- --test-threads=1
